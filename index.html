<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon Heart - Maryam</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #1a0033 0%, #000000 100%);
        }
        
        #center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #df00ff;
            font-size: 38px; /* Slightly smaller name */
            font-family: "Segoe UI", Tahoma, sans-serif;
            font-weight: bold;
            text-shadow: 0 0 15px #bc13fe, 0 0 30px #bc13fe;
            opacity: 0;
            pointer-events: none;
            letter-spacing: 4px;
        }

        svg { position: absolute; width: 0; height: 0; }
    </style>
</head>

<body>

    <div id="center-text">MARYAM</div>

    <svg viewBox="0 0 600 552">
        <path id="heart-path" d="M300,520 C-180,200 150,-120 300,130 C450,-120 780,200 300,520 Z" />
    </svg>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const tl = gsap.timeline({ repeat: -1, yoyo: true, repeatDelay: 1.5 });

        const path = document.querySelector("#heart-path");
        const length = path.getTotalLength();
        const vertices = [];

        // Dense sampling for a thick heart
        for (let i = 0; i < length; i += 0.12) {
            for (let j = 0; j < 2; j++) {
                const point = path.getPointAtLength(i);
                const vector = new THREE.Vector3(point.x, -point.y, 0);
                
                // Jitter for volume/thickness
                vector.x += (Math.random() - 0.5) * 40; 
                vector.y += (Math.random() - 0.5) * 40;
                vector.z += (Math.random() - 0.5) * 70;
                
                vertices.push(vector);

                tl.from(vector, {
                    x: 300,
                    y: -276,
                    z: 0,
                    ease: "power2.inOut",
                    duration: "random(2.5, 5)"
                }, i * 0.001);
            }
        }

        // Name fade-in
        tl.to("#center-text", {
            opacity: 1,
            duration: 2,
            ease: "power2.inOut"
        }, "-=2.5");

        const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
        const material = new THREE.PointsMaterial({
            color: 0xbc13fe, // Neon Purple
            blending: THREE.AdditiveBlending,
            size: 4.5, // Thick particles
            transparent: true,
            opacity: 0.8
        });

        const particles = new THREE.Points(geometry, material);
        particles.position.x -= 300;
        particles.position.y += 276;
        scene.add(particles);

        // This replaces the 360 rotation with a gentle swaying effect
        gsap.fromTo(scene.rotation, { y: -0.25 }, {
            y: 0.25,
            repeat: -1,
            yoyo: true,
            ease: 'power1.inOut',
            duration: 4
        });

        function render() {
            requestAnimationFrame(render);
            geometry.setFromPoints(vertices);
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        render();
        window.addEventListener('resize', onWindowResize);
    </script>
</body>

</html>
